<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Native SVG blur filter for the glow effect -->
    <filter id="led-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- background board (transparent with a subtle light gray border) --> 
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#e1e4e8" stroke-width="2"/> 
  
  <!-- ROW 1: # # . # --> 
  <circle cx="10" cy="10" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="22" cy="10" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="34" cy="10" r="4.5" fill="#990000" opacity="0.15"/> 
  <circle cx="46" cy="10" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  
  <!-- ROW 2: # . # . --> 
  <circle cx="10" cy="22" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="22" cy="22" r="4.5" fill="#990000" opacity="0.15"/> 
  <circle cx="34" cy="22" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="46" cy="22" r="4.5" fill="#990000" opacity="0.15"/> 
  
  <!-- ROW 3: . # . # --> 
  <circle cx="10" cy="34" r="4.5" fill="#990000" opacity="0.15"/> 
  <circle cx="22" cy="34" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="34" cy="34" r="4.5" fill="#990000" opacity="0.15"/> 
  <circle cx="46" cy="34" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  
  <!-- ROW 4: # # # # --> 
  <circle cx="10" cy="46" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="22" cy="46" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="34" cy="46" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  <circle cx="46" cy="46" r="4.5" fill="#990000" filter="url(#led-glow)"/> 
  
  <!-- Core reflective highlights (placed above the glow layer) --> 
  <circle cx="10" cy="10" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="22" cy="10" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="34" cy="10" r="1.5" fill="#d1d5da" opacity="0.2"/> 
  <circle cx="46" cy="10" r="1.5" fill="#ffffff" opacity="0.4"/> 
  
  <circle cx="10" cy="22" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="22" cy="22" r="1.5" fill="#d1d5da" opacity="0.2"/> 
  <circle cx="34" cy="22" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="46" cy="22" r="1.5" fill="#d1d5da" opacity="0.2"/> 
  
  <circle cx="10" cy="34" r="1.5" fill="#d1d5da" opacity="0.2"/> 
  <circle cx="22" cy="34" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="34" cy="34" r="1.5" fill="#d1d5da" opacity="0.2"/> 
  <circle cx="46" cy="34" r="1.5" fill="#ffffff" opacity="0.4"/> 
  
  <circle cx="10" cy="46" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="22" cy="46" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="34" cy="46" r="1.5" fill="#ffffff" opacity="0.4"/> 
  <circle cx="46" cy="46" r="1.5" fill="#ffffff" opacity="0.4"/> 
</svg>
