<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico W Network Manager</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f4f7; color: #333; max-width: 500px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card.accent { border-top: 4px solid #0070f3; }
        h2 { margin-top: 0; color: #111; }
        h3 { color: #555; margin-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #0070f3; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #0051a8; }
        .secondary-btn { background: #666; margin-bottom: 15px; }
        .secondary-btn:hover { background: #444; }
        .net-item { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 1px solid #eee; }
        .net-row { display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: #ff3b30; text-decoration: none; font-size: 14px; font-weight: bold; }
        .app-meta { font-size: 12px; color: #777; background: #f9f9f9; padding: 6px; border-radius: 4px; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- NEW: Dedicated Text-Only Update Container -->
    <div class="card accent" id="text-only-card" style="display: none;">
        <h2>📝 Update Current Location Text</h2>
        <p style="font-size: 13px; color: #555; margin-top: -10px;">Modifying texts for actively connected network.</p>
        <form action="/updatetext" method="POST">
            <div class="form-group">
                <label for="utxt1">App Text 1</label>
                <input type="text" id="utxt1" name="txt1" maxlength="64">
            </div>
            <div class="form-group">
                <label for="utxt2">App Text 2</label>
                <input type="text" id="utxt2" name="txt2" maxlength="64">
            </div>
            <div class="form-group">
                <label for="utxt3">App Text 3</label>
                <input type="text" id="utxt3" name="txt3" maxlength="64">
            </div>
            <div class="form-group">
                <label for="utxt4">App Text 4</label>
                <input type="text" id="utxt4" name="txt4" maxlength="64">
            </div>
            <button type="submit" style="background: #28a745;">Apply Text Changes Only</button>
        </form>
    </div>

    <div class="card">
        <h2>Add New Location / Wi-Fi</h2>
        <button type="button" class="secondary-btn" id="scan-btn" onclick="scanNetworks()">🔍 Scan Nearby Networks</button>
        <div id="scan-results" style="margin-bottom: 15px; max-height: 150px; overflow-y: auto;"></div>

        <form action="/save" method="POST">
            <div class="form-group">
                <label for="ssid">Network Name (SSID)</label>
                <input type="text" id="ssid" name="ssid" required to placeholder="Select above or type here">
            </div>
            <div class="form-group">
                <label for="password">Wi-Fi Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <h3>Application Custom Strings</h3>
            <div class="form-group">
                <label for="txt1">App Text 1 (Max 64 chars)</label>
                <input type="text" id="txt1" name="txt1" maxlength="64">
            </div>
            <div class="form-group">
                <label for="txt2">App Text 2 (Max 64 chars)</label>
                <input type="text" id="txt2" name="txt2" maxlength="64">
            </div>
            <div class="form-group">
                <label for="txt3">App Text 3 (Max 64 chars)</label>
                <input type="text" id="txt3" name="txt3" maxlength="64">
            </div>
            <div class="form-group">
                <label for="txt4">App Text 4 (Max 64 chars)</label>
                <input type="text" id="txt4" name="txt4" maxlength="64">
            </div>
            <button type="submit">Save Full Profile</button>
        </form>
    </div>

    <div class="card">
        <h2>Saved Locations</h2>
        <div id="saved-list">Loading saved networks...</div>
    </div>

    <script>
        function loadSaved() {
            fetch('/list')
                .then(res => res.json())
                .then(data => {
                    const listEl = document.getElementById('saved-list');
                    if(data.length === 0) { listEl.innerHTML = "No profiles saved yet."; return; }
                    listEl.innerHTML = data.map((net, index) => `
                        <div class="net-item">
                            <div class="net-row">
                                <span><strong>${net.ssid}</strong></span>
                                <a href="/delete?index=${index}" class="delete-btn">Remove</a>
                            </div>
                            <div class="app-meta">
                                📝 T1: ${net.txt1 || '-'} | T2: ${net.txt2 || '-'}<br>
                                📝 T3: ${net.txt3 || '-'} | T4: ${net.txt4 || '-'}
                            </div>
                        </div>
                    `).join('');

                    // Check if the board says we are connected to a specific network right now
                    fetch('/current-ssid')
                        .then(res => res.text())
                        .then(currentSsid => {
                            if (currentSsid && currentSsid !== "OFFLINE") {
                                const currentNet = data.find(n => n.ssid === currentSsid);
                                if (currentNet) {
                                    document.getElementById('text-only-card').style.display = 'block';
                                    document.getElementById('utxt1').value = currentNet.txt1 || '';
                                    document.getElementById('utxt2').value = currentNet.txt2 || '';
                                    document.getElementById('utxt3').value = currentNet.txt3 || '';
                                    document.getElementById('utxt4').value = currentNet.txt4 || '';
                                }
                            }
                        });
                });
        }

        function scanNetworks() {
            const btn = document.getElementById('scan-btn');
            const resultsEl = document.getElementById('scan-results');
            btn.disabled = true;
            btn.innerText = "Scanning...";
            fetch('/scan')
                .then(res => res.json())
                .then(networks => {
                    btn.disabled = false; btn.innerText = "🔍 Scan Nearby Networks";
                    resultsEl.innerHTML = networks.map(net => `
                        <div class="net-item scan-item" onclick="selectSSID('${net.ssid}')">
                            <div class="net-row"><span>📱 <strong>${net.ssid}</strong></span><span class="signal">${net.rssi} dBm</span></div>
                        </div>
                    `).join('');
                });
        }

        function selectSSID(ssid) { document.getElementById('ssid').value = ssid; }
        loadSaved();
    </script>
</body>
</html>
